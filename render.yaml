# Render Blueprint — one-click public deploy of both services.
# In the Render dashboard: New + → Blueprint → point at this repo/branch.
# Render builds the two Docker services and wires the frontend to the backend.
services:
  - type: web
    name: scs-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    # Start command lives in the Dockerfile CMD (binds to the injected $PORT).
    healthCheckPath: /healthz
    envVars:
      - key: SCS_SEED_DEMO
        value: "1"
      - key: SCS_PROVENANCE_SIGNING_KEY
        generateValue: true
      # Storage uses the container's ephemeral disk (free tier). It re-seeds on
      # each boot, so trying it costs nothing. For persistence across restarts,
      # add a Render disk (paid) mounted at /var/data and point SCS_STORAGE_DIR there.
      # --- KREA (real generation) ---
      # Use KREA when a key is present; without it, the app falls back to the
      # built-in stub so it still runs. Enter the key in the Render dashboard
      # (sync:false → prompted at deploy, never stored in git).
      - key: SCS_GENERATION_PROVIDER
        value: krea
      - key: SCS_KREA_API_KEY
        sync: false
      - key: SCS_KREA_AUTH_SCHEME
        value: basic
      - key: SCS_KREA_MODEL
        value: flux_dev

  - type: web
    name: scs-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    envVars:
      # Runtime proxy target — the backend service's public host (the proxy
      # route prepends https://). Override with a full URL if you prefer.
      - key: BACKEND_URL
        fromService:
          type: web
          name: scs-backend
          property: host

  # TruthLens — standalone Next.js app (independent of the studio services).
  # Runs out of the box on free public APIs; set ANTHROPIC_API_KEY to enable
  # the content-analysis + open-web propagation layers.
  - type: web
    name: truthlens
    runtime: docker
    rootDir: truthlens
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_FACTCHECK_KEY
        sync: false
      - key: IPINFO_TOKEN
        sync: false
