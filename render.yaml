# Render Blueprint — one-click public deploy of both services.
# In the Render dashboard: New + → Blueprint → point at this repo/branch.
# Render builds the two Docker services and wires the frontend to the backend.
services:
  - type: web
    name: scs-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    # Bind uvicorn to the port Render injects.
    dockerCommand: sh -c "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /healthz
    envVars:
      - key: SCS_SEED_DEMO
        value: "1"
      - key: SCS_PROVENANCE_SIGNING_KEY
        generateValue: true
      - key: SCS_STORAGE_DIR
        value: /var/data/storage
      - key: SCS_DATABASE_URL
        value: sqlite:////var/data/storage/scs.db
    disk:
      name: scs-storage
      mountPath: /var/data/storage
      sizeGB: 1

  - type: web
    name: scs-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    envVars:
      # Runtime proxy target — the backend service's public host (the proxy
      # route prepends https://). Override with a full URL if you prefer.
      - key: BACKEND_URL
        fromService:
          type: web
          name: scs-backend
          property: host

  # TruthLens — standalone Next.js app (independent of the studio services).
  # Runs out of the box on free public APIs; set ANTHROPIC_API_KEY to enable
  # the content-analysis + open-web propagation layers.
  - type: web
    name: truthlens
    runtime: docker
    rootDir: truthlens
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_FACTCHECK_KEY
        sync: false
      - key: IPINFO_TOKEN
        sync: false
