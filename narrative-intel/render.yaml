# Render blueprint for the narrative-intel service (API + ingestion worker + DB).
# In Render: New + → Blueprint → point at this repo, rootDir narrative-intel.
databases:
  - name: narrative-db
    plan: free

services:
  - type: web
    name: narrative-api
    runtime: python
    rootDir: narrative-intel
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: narrative-db
          property: connectionString
      - key: X_BEARER_TOKEN
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: RSS_FEEDS
        sync: false

  - type: worker
    name: narrative-worker
    runtime: python
    rootDir: narrative-intel
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: narrative-db
          property: connectionString
      - key: POLL_INTERVAL_SECONDS
        value: "600"
      - key: X_BEARER_TOKEN
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: RSS_FEEDS
        sync: false
