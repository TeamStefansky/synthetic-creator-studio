name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Core runtime + test deps. torch/diffusers are intentionally excluded
          # (no GPU on CI); the stub generation provider exercises the pipeline.
          pip install -r requirements.txt

      - name: Run test suite
        env:
          SCS_DATABASE_URL: "sqlite:///./ci.db"
          SCS_PROVENANCE_SIGNING_KEY: "ci-signing-key"
        run: pytest -q

      - name: Run test suite against the real C2PA backend
        env:
          SCS_DATABASE_URL: "sqlite:///./ci_c2pa.db"
          SCS_PROVENANCE_SIGNING_KEY: "ci-signing-key"
          SCS_PROVENANCE_BACKEND: "c2pa"
        run: pytest -q tests/test_c2pa_provenance.py
