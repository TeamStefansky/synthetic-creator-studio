name: Deploy demo to GitHub Pages

# Manual redeploy of the static demo to the gh-pages branch (the source GitHub
# Pages serves from). Triggered on demand so it never blocks PR checks. The
# GITHUB_TOKEN can't auto-create a Pages *site* (that was enabled once by the
# first gh-pages push), but it can push the branch, which GitHub then builds.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build static demo
        working-directory: frontend
        env:
          NEXT_PUBLIC_DEMO: "1"
        # Static export has no server routes — drop the runtime API proxy; the
        # demo uses an in-browser mock API instead.
        run: |
          npm ci --no-audit --no-fund
          rm -rf app/api
          npm run build
          touch out/.nojekyll

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/out
          publish_branch: gh-pages
