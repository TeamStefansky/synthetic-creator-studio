name: Deploy demo to GitHub Pages

on:
  push:
    branches: ["claude/hopeful-fermat-nMkMF", "main"]
    paths: ["frontend/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Build static demo
        env:
          NEXT_PUBLIC_DEMO: "1"
        # The static export has no server routes — drop the runtime API proxy,
        # the demo uses an in-browser mock API instead.
        run: |
          rm -rf app/api
          npm run build
          touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
